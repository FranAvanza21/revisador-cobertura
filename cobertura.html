<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comprobador de Cobertura</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <script src="config.js"></script>
  <style>
    .step-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 700;
      background-color: #0d6efd;
      color: #fff;
      margin-right: 5px;
      flex-shrink: 0;
    }
    .ac-wrapper { position: relative; }
    .ac-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      z-index: 1000;
      max-height: 220px;
      overflow-y: auto;
      border: 1px solid #dee2e6;
      border-radius: 0.375rem;
      background: #fff;
      box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,.075);
      padding: 0;
      margin: 0;
      list-style: none;
    }
    .ac-item {
      cursor: pointer;
      padding: 0.375rem 0.75rem;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.875rem;
    }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover, .ac-item.active { background-color: #0d6efd; color: #fff; }
    .result-expandable {
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .result-expandable.collapsed { max-height: 0; }
    .result-expandable.expanded  { max-height: 4000px; }
  </style>
</head>
<body class="bg-light">
  <div class="container-fluid py-4" style="max-width: 1100px;">
    <div class="row g-4 align-items-start">

      <!-- COLUMNA IZQUIERDA: FORMULARIO -->
      <div class="col-12 col-lg-6">
        <div id="panel-main" class="card shadow-sm">
          <div class="card-header bg-primary text-white">
            <strong>Comprobador de Cobertura de Red</strong>
          </div>
          <div class="card-body">

            <!-- PROVINCIA -->
            <div class="mb-3">
              <label for="ac-provincia-input" class="form-label fw-semibold">
                <span class="step-badge">0</span>Provincia
              </label>
              <div id="ac-provincia-container" class="ac-wrapper"></div>
              <div id="err-provincia" class="text-danger small mt-1" hidden></div>
            </div>

            <!-- POBLACIÓN -->
            <div class="mb-3">
              <label for="ac-poblacion-input" class="form-label fw-semibold">
                <span class="step-badge">1</span>Población
              </label>
              <div id="ac-poblacion-container" class="ac-wrapper"></div>
              <div id="err-poblacion" class="text-danger small mt-1" hidden></div>
            </div>

            <!-- TIPO DE VÍA -->
            <div class="mb-3">
              <label for="sel-tipo-via" class="form-label fw-semibold">
                <span class="step-badge">2</span>Tipo de Vía
              </label>
              <select id="sel-tipo-via" class="form-select" disabled>
                <option value="">Seleccione una población primero</option>
              </select>
              <div id="err-tipo-via" class="text-danger small mt-1" hidden></div>
            </div>

            <!-- VÍA -->
            <div class="mb-3">
              <label for="ac-via-input" class="form-label fw-semibold">
                <span class="step-badge">3</span>Vía
              </label>
              <div id="ac-via-container" class="ac-wrapper"></div>
              <div id="err-via" class="text-danger small mt-1" hidden></div>
            </div>

            <!-- NÚMERO -->
            <div class="mb-3">
              <label for="sel-numero" class="form-label fw-semibold">
                <span class="step-badge">4</span>Número
              </label>
              <select id="sel-numero" class="form-select" disabled>
                <option value="">Seleccione una vía primero</option>
              </select>
              <div id="err-numero" class="text-danger small mt-1" hidden></div>
            </div>

            <!-- PASOS DINÁMICOS: piso, bloque, escalera, planta, puerta… -->
            <div id="dynamic-steps"></div>

            <!-- SPINNER -->
            <div id="spinner" class="text-center text-muted my-3" hidden>
              <div class="spinner-border spinner-border-sm text-primary me-2" role="status" aria-hidden="true"></div>
              <span class="small">Cargando...</span>
            </div>

            <!-- BOTÓN PRINCIPAL -->
            <div class="d-grid">
              <button id="btn-check" class="btn btn-primary" disabled>
                Comprobar cobertura
              </button>
            </div>

          </div>
        </div>
      </div>

      <!-- COLUMNA DERECHA: RESULTADO -->
      <div class="col-12 col-lg-6" id="col-result" hidden>
        <div class="card shadow-sm">
          <div class="card-header bg-secondary text-white">
            <strong>Resultado</strong>
          </div>
          <div class="card-body">
            <div id="result-summary"></div>
            <div class="result-expandable collapsed" id="result-expandable">
              <hr class="mt-2 mb-2">
              <div id="result-details"></div>
            </div>
            <button id="btn-reset" class="btn btn-outline-secondary btn-sm mt-3">
              Nueva búsqueda
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    /*
     * Edge-cases conocidos:
     * 1. /Cobertura/Pisos vacío → no se renderiza piso; la precarga usa piso=''.
     * 2. Precarga devuelve 404 → _baseResults=[], btn-check deshabilitado con mensaje.
     * 3. Todos los registros comparten el mismo valor en un campo → ese campo no se muestra.
     * 4. Autocomplete blur con texto inválido → error de validación, la cascada no avanza.
     * 5. "Ver más" expandido al lanzar nueva búsqueda → el panel se contrae automáticamente.
     * 6. Proxy UUII no disponible → degradación silenciosa (detail = null).
     * 7. Al cambiar piso se rehace la precarga y se recalculan los filtros cliente.
     * 8. onSubmit usa los resultados ya filtrados en memoria; no hay segunda llamada API.
     */

    // ─── CONFIGURACIÓN ─────────────────────────────────────────────────────────
    const BASE_URL   = (typeof SIA_API_URL !== 'undefined') ? SIA_API_URL : '';
    const API_TOKEN  = '';
    const DEBUG_MODE = false;

    const ESTADOS_CON_COBERTURA = ['ACTIVO', 'DISPONIBLE', 'CON COBERTURA', 'LIBERADO', 'SI', 'COMERCIALIZABLE'];
    const ESTADOS_SIN_COBERTURA = ['INACTIVO', 'SIN COBERTURA', 'NO COBERTURA', 'BAJA', 'ANULADO', 'NO'];

    // Orden en que se ofrecen los filtros cliente tras número/piso
    const DYNAMIC_FILTER_ORDER = ['bloque', 'escalera', 'planta', 'puerta', 'letra', 'portalPuerta'];

    const FIELD_LABELS = {
      id:              'ID interno',
      idUUII:          'ID UUII',
      gescal37:        'ID de Domicilio',
      poblacion:       'Población',
      zona:            'Zona',
      tipoVia:         'Tipo de Vía',
      via:             'Vía',
      numero:          'Número',
      bloque:          'Bloque',
      portalPuerta:    'Portal / Puerta',
      letra:           'Letra',
      escalera:        'Escalera',
      cto:             'CTO',
      planta:          'Planta',
      puerta:          'Puerta',
      estado:          'Estado',
      direccionCTO:    'Dirección CTO',
      tipoInstalacion: 'Tipo de Instalación',
    };

    const RED_LABELS = {
      masmovilMUT: 'MasMóvil',
      onivia:      'Onivia',
      masmovilBS:  'MasMóvil/Orange',
      avanza:      'Avanza',
    };

    // ─── UTILIDADES ────────────────────────────────────────────────────────────
    const debug = (...args) => { if (DEBUG_MODE) console.log('[COB]', ...args); };

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function normalizeStr(str) {
      return String(str).normalize('NFD').replace(/\p{Mn}/gu, '').toLowerCase();
    }

    function translateRed(rawName) {
      if (!rawName) return rawName;
      const lower = String(rawName).toLowerCase();
      const key   = Object.keys(RED_LABELS).find(k => k.toLowerCase() === lower);
      return key ? RED_LABELS[key] : rawName;
    }

    // ─── AUTOCOMPLETE ──────────────────────────────────────────────────────────
    function buildAutocomplete({ containerId, data, onSelect, placeholder, errId }) {
      const container = document.getElementById(containerId);

      const input = document.createElement('input');
      input.type         = 'text';
      input.className    = 'form-control';
      input.placeholder  = placeholder || 'Buscar...';
      input.autocomplete = 'off';
      input.disabled     = true;
      input.id           = containerId.replace('-container', '-input');

      const dropdown = document.createElement('ul');
      dropdown.className     = 'ac-dropdown';
      dropdown.style.display = 'none';

      container.appendChild(input);
      container.appendChild(dropdown);

      let _data          = data || [];
      let _selectedValue = '';
      let _activeIndex   = -1;

      function setActive(index) {
        const items = dropdown.querySelectorAll('.ac-item');
        items.forEach((li, i) => li.classList.toggle('active', i === index));
        _activeIndex = index;
      }

      function renderDropdown(items) {
        dropdown.innerHTML = '';
        _activeIndex = -1;
        if (!items.length) { dropdown.style.display = 'none'; return; }
        items.forEach(item => {
          const li = document.createElement('li');
          li.className     = 'ac-item';
          li.textContent   = item;
          li.dataset.value = item;
          li.addEventListener('mousedown', e => { e.preventDefault(); commit(item); });
          dropdown.appendChild(li);
        });
        dropdown.style.display = 'block';
      }

      function getFiltered() {
        const q = normalizeStr(input.value);
        if (!q) return _data;
        return _data.filter(item => normalizeStr(item).includes(q));
      }

      function commit(value) {
        input.value    = value;
        _selectedValue = value;
        dropdown.style.display = 'none';
        _activeIndex   = -1;
        if (errId) ui.setError(errId, '');
        onSelect(value);
      }

      input.addEventListener('input', () => {
        _selectedValue = '';
        renderDropdown(getFiltered());
      });

      input.addEventListener('focus', () => renderDropdown(getFiltered()));

      input.addEventListener('blur', () => {
        setTimeout(() => {
          dropdown.style.display = 'none';
          if (!input.value) { _selectedValue = ''; return; }
          if (!_selectedValue) {
            const exact = _data.find(item => normalizeStr(item) === normalizeStr(input.value));
            if (exact) {
              commit(exact);
            } else if (errId) {
              ui.setError(errId, 'Seleccione una opción válida de la lista.');
            }
          }
        }, 150);
      });

      input.addEventListener('keydown', e => {
        const items = dropdown.querySelectorAll('.ac-item');
        if (e.key === 'Escape') { dropdown.style.display = 'none'; _activeIndex = -1; return; }
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          if (dropdown.style.display === 'none') renderDropdown(getFiltered());
          setActive(Math.min(_activeIndex + 1, items.length - 1));
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          setActive(Math.max(_activeIndex - 1, 0));
        } else if (e.key === 'Enter') {
          e.preventDefault();
          if (_activeIndex >= 0 && items[_activeIndex]) {
            commit(items[_activeIndex].dataset.value);
          } else {
            const filtered = getFiltered();
            if (filtered.length === 1) commit(filtered[0]);
          }
        }
      });

      document.addEventListener('click', e => {
        if (!container.contains(e.target)) dropdown.style.display = 'none';
      });

      return {
        reset() {
          input.value    = '';
          _selectedValue = '';
          _activeIndex   = -1;
          dropdown.style.display = 'none';
          dropdown.innerHTML     = '';
          input.disabled = true;
          if (errId) ui.setError(errId, '');
        },
        setData(newData) {
          _data          = newData || [];
          input.disabled = false;
          input.value    = '';
          _selectedValue = '';
        },
        getValue() { return _selectedValue; },
      };
    }

    // ─── GESTIÓN DE TOKEN ──────────────────────────────────────────────────────
    const auth = {
      _token: API_TOKEN || sessionStorage.getItem('token') || '',
      get token()  { return this._token; },
      set token(v) { this._token = v; sessionStorage.setItem('token', v); },
      clear()      { this._token = ''; sessionStorage.removeItem('token'); },
      hasToken()   { return !!this._token; },
    };

    // ─── API SERVICE ───────────────────────────────────────────────────────────
    const apiService = {
      async get(path, params = new URLSearchParams()) {
        const qs  = params.toString();
        const url = `${BASE_URL}${path}${qs ? '?' + qs : ''}`;
        debug('GET', url);
        const res = await fetch(url, {
          headers: { 'Authorization': `Bearer ${auth.token}`, 'Accept': 'application/json' },
        });
        if (!res.ok) {
          const body = await res.text().catch(() => res.statusText);
          throw { status: res.status, body };
        }
        return res.json();
      },
      async getProvincias() {
        const data = await this.get('/Cobertura/Provincias');
        return Array.isArray(data) ? data : [data];
      },
      async getPoblaciones(provincia = '') {
        const p = new URLSearchParams();
        if (provincia) p.set('provincia', provincia);
        const data = await this.get('/Cobertura/Poblaciones', p);
        return Array.isArray(data) ? data : [data];
      },
      async getTipoVia(poblacion) {
        return this.get('/Cobertura/TipoVia', new URLSearchParams({ Poblacion: poblacion }));
      },
      async getDomicilio(poblacion, tipoVia) {
        return this.get('/Cobertura/Domicilio', new URLSearchParams({ Poblacion: poblacion, TipoVia: tipoVia }));
      },
      async getNumero(poblacion, tipoVia, via) {
        return this.get('/Cobertura/Numero', new URLSearchParams({ Poblacion: poblacion, TipoVia: tipoVia, Via: via }));
      },
      async getPisos(poblacion, tipoVia, via, numero) {
        return this.get('/Cobertura/Pisos', new URLSearchParams({
          Poblacion: poblacion, TipoVia: tipoVia, Via: via, Numero: numero,
        }));
      },
      async getCobertura(poblacion, tipoVia, via, numero, pisos = '') {
        const p = new URLSearchParams({ Poblacion: poblacion, TipoVia: tipoVia, Via: via, Numero: numero });
        if (pisos) p.set('Pisos', pisos);
        return this.get('/Cobertura', p);
      },
      async getDetailUUII(idUuii) {
        const url = `/api/detail-uuii?id=${encodeURIComponent(idUuii.trim())}`;
        debug('GET (proxy)', url);
        try {
          const res = await fetch(url, {
            headers: { 'Authorization': `Bearer ${auth.token}`, 'Accept': 'application/json' },
          });
          if (!res.ok) return null;
          return res.json();
        } catch (e) {
          debug('getDetailUUII error:', e);
          return null;
        }
      },
    };

    // ─── UI ────────────────────────────────────────────────────────────────────
    const ui = {
      spinner(show) {
        document.getElementById('spinner').hidden = !show;
      },

      // fromStep: 0=población, 1=tipoVía, 2=vía, 3=número, 4=pasos dinámicos
      resetFrom(fromStep) {
        if (fromStep <= 0) { app._acPoblacion.reset(); }
        if (fromStep <= 1) {
          const s = document.getElementById('sel-tipo-via');
          s.innerHTML = '<option value="">Seleccione una población primero</option>';
          s.disabled  = true;
          this.setError('err-tipo-via', '');
        }
        if (fromStep <= 2) { app._acVia.reset(); }
        if (fromStep <= 3) {
          const s = document.getElementById('sel-numero');
          s.innerHTML = '<option value="">Seleccione una vía primero</option>';
          s.disabled  = true;
          this.setError('err-numero', '');
        }
        if (fromStep <= 4) { this.resetDynamicSteps(); }
        document.getElementById('btn-check').disabled = true;
        document.getElementById('btn-check').textContent = 'Comprobar cobertura';
        document.getElementById('col-result').hidden  = true;
      },

      resetDynamicSteps() {
        document.getElementById('dynamic-steps').innerHTML = '';
      },

      setError(errId, msg) {
        const el = document.getElementById(errId);
        if (!el) return;
        el.textContent = msg;
        el.hidden      = !msg;
      },

      populateSelect(selId, items, labelFn, valueFn, placeholder = 'Seleccione...') {
        const sel = document.getElementById(selId);
        sel.innerHTML = `<option value="">${placeholder}</option>`;
        for (const item of items) {
          const opt       = document.createElement('option');
          opt.value       = valueFn(item);
          opt.textContent = labelFn(item);
          sel.appendChild(opt);
        }
        sel.disabled = false;
      },

      renderDynamicStep(fieldDef) {
        const container = document.getElementById('dynamic-steps');
        const wrapper   = document.createElement('div');
        wrapper.className     = 'mb-3';
        wrapper.dataset.field = fieldDef.fieldName;

        const label = document.createElement('label');
        label.className = 'form-label fw-semibold';
        label.htmlFor   = `dyn-${fieldDef.fieldName}`;

        const badge = document.createElement('span');
        badge.className   = 'step-badge';
        badge.textContent = fieldDef.stepNum;
        label.appendChild(badge);
        label.appendChild(document.createTextNode(fieldDef.label));

        if (fieldDef.optional) {
          const opt = document.createElement('span');
          opt.className   = 'text-muted fw-normal small';
          opt.textContent = ' (opcional)';
          label.appendChild(opt);
        }

        const sel = document.createElement('select');
        sel.id        = `dyn-${fieldDef.fieldName}`;
        sel.className = 'form-select';
        const allLabel = fieldDef.optional
          ? `Sin filtrar por ${fieldDef.label.toLowerCase()} (todos)`
          : `Seleccione ${fieldDef.label.toLowerCase()}...`;
        sel.innerHTML = `<option value="">${allLabel}</option>`;
        for (const item of fieldDef.data) {
          const opt = document.createElement('option');
          opt.value = opt.textContent = item;
          sel.appendChild(opt);
        }

        wrapper.appendChild(label);
        wrapper.appendChild(sel);
        container.appendChild(wrapper);
        return sel;
      },

      renderResultSummary(data, detail) {
        const first  = data[0];
        const estado = (first.estado || '').trim().toUpperCase();

        let cls = 'alert-warning', icon = '⚠️';
        let statusText = `Estado: ${escapeHtml(first.estado || 'desconocido')}`;
        if (ESTADOS_CON_COBERTURA.some(v => estado.includes(v))) {
          cls = 'alert-success'; icon = '✅'; statusText = 'Con cobertura';
        } else if (ESTADOS_SIN_COBERTURA.some(v => estado.includes(v))) {
          cls = 'alert-danger';  icon = '❌'; statusText = 'Sin cobertura';
        } else if (!estado) {
          cls = 'alert-success'; icon = '✅'; statusText = 'Dirección encontrada';
        }

        const countBadge = data.length > 1
          ? `<span class="badge bg-secondary ms-1">${data.length} registros</span>` : '';

        const parts  = [first.tipoVia, first.via, first.numero, first.bloque, first.escalera, first.planta, first.puerta]
          .filter(Boolean);
        const address = escapeHtml(parts.join(' '));
        const ciudad  = first.poblacion ? ` &mdash; ${escapeHtml(first.poblacion)}` : '';

        let altaDobleHtml = '';
        if (detail && detail.alta_doble) {
          const desc    = detail.alta_doble_desc    ? escapeHtml(detail.alta_doble_desc)    : '';
          const comment = detail.alta_doble_comment
            ? `<br><small class="text-muted">${escapeHtml(detail.alta_doble_comment)}</small>` : '';
          altaDobleHtml = `<div class="alert alert-warning mt-2 mb-2 py-2">⚠️ Alta doble: <strong>${desc}</strong>${comment}</div>`;
        }

        const mainGescal = first.gescal37;
        const copyBtn = mainGescal ? `
          <div class="mt-2">
            <label class="form-label small text-muted mb-1">ID de Domicilio</label>
            <div class="input-group input-group-sm">
              <input type="text" class="form-control form-control-sm font-monospace" readonly id="gescal-inp-0">
              <button class="btn btn-outline-secondary btn-sm" id="gescal-btn-0">Copiar ID</button>
            </div>
          </div>` : '';

        let redVelHtml = '';
        if (detail) {
          if (detail.red) {
            redVelHtml += `<p class="mb-1 small"><span class="text-muted">Nombre de red:</span> <strong>${escapeHtml(translateRed(detail.red))}</strong></p>`;
          }
          const vels = detail.perfiles ? Object.keys(detail.perfiles) : [];
          if (vels.length) {
            const badges = vels.map(v => `<span class="badge bg-primary ms-1">${escapeHtml(String(v))}</span>`).join('');
            redVelHtml += `<p class="mb-1 small"><span class="text-muted">Velocidades:</span>${badges}</p>`;
          }
        }

        return `
          <div class="alert ${cls} mb-2"><strong>${icon} ${statusText}</strong>${countBadge}</div>
          <p class="mb-1 small text-secondary">${address}${ciudad}</p>
          ${altaDobleHtml}
          ${redVelHtml}
          ${copyBtn}
          <button class="btn btn-link btn-sm px-0 mt-2 text-decoration-none" id="btn-toggle-details">Ver más información ▾</button>
        `;
      },

      renderResultDetails(data, detail) {
        const first = data[0];
        let html = '';

        const skipFields = ['id'];
        html += '<table class="table table-sm table-bordered small mb-2"><tbody>';
        for (const [key, val] of Object.entries(first)) {
          if (skipFields.includes(key) || val === null || val === undefined || val === '') continue;
          const label      = FIELD_LABELS[key] || key;
          const displayVal = key === 'gescal37'
            ? `<span style="white-space:pre">${escapeHtml(String(val))}</span>`
            : escapeHtml(String(val));
          html += `<tr><th class="text-muted fw-normal" style="width:40%">${escapeHtml(label)}</th><td>${displayVal}</td></tr>`;
        }
        html += '</tbody></table>';

        data.forEach((rec, i) => {
          if (i === 0 || !rec.gescal37) return;
          html += `
            <div class="mb-2">
              <label class="form-label small text-muted mb-1">ID de Domicilio (${i + 1})</label>
              <div class="input-group input-group-sm">
                <input type="text" class="form-control form-control-sm font-monospace" readonly id="gescal-inp-${i}">
                <button class="btn btn-outline-secondary btn-sm" id="gescal-btn-${i}">Copiar</button>
              </div>
            </div>`;
        });

        return html;
      },

      async showResult(data) {
        const colResult    = document.getElementById('col-result');
        const summaryEl    = document.getElementById('result-summary');
        const expandableEl = document.getElementById('result-expandable');
        const detailsEl    = document.getElementById('result-details');

        colResult.hidden = false;
        expandableEl.classList.remove('expanded');
        expandableEl.classList.add('collapsed');

        if (!data || data.length === 0) {
          summaryEl.innerHTML = `<div class="alert alert-danger mb-0"><strong>❌ Sin cobertura</strong> — No se encontraron registros para esta dirección.</div>`;
          detailsEl.innerHTML = '';
          return;
        }

        const first  = data[0];
        const uuiiId = first.gescal37 || first.idUUII;
        const detail = uuiiId ? await apiService.getDetailUUII(uuiiId) : null;

        summaryEl.innerHTML = this.renderResultSummary(data, detail);
        detailsEl.innerHTML = this.renderResultDetails(data, detail);

        data.forEach((rec, i) => {
          if (!rec.gescal37) return;
          const inp = document.getElementById(`gescal-inp-${i}`);
          const btn = document.getElementById(`gescal-btn-${i}`);
          if (inp) inp.value = rec.gescal37;
          if (btn) btn.addEventListener('click', () => {
            navigator.clipboard.writeText(rec.gescal37).then(() => {
              btn.textContent = '✓ Copiado';
              setTimeout(() => { btn.textContent = i === 0 ? 'Copiar ID' : 'Copiar'; }, 1500);
            }).catch(() => { inp && inp.select(); document.execCommand('copy'); });
          });
        });

        const toggleBtn = document.getElementById('btn-toggle-details');
        if (toggleBtn) {
          toggleBtn.addEventListener('click', () => {
            const isCollapsed = expandableEl.classList.contains('collapsed');
            expandableEl.classList.toggle('collapsed', !isCollapsed);
            expandableEl.classList.toggle('expanded',  isCollapsed);
            toggleBtn.textContent = isCollapsed ? 'Ver menos ▴' : 'Ver más información ▾';
          });
        }
      },

      showResultError(msg) {
        document.getElementById('col-result').hidden = false;
        document.getElementById('result-expandable').classList.remove('expanded');
        document.getElementById('result-expandable').classList.add('collapsed');
        document.getElementById('result-summary').innerHTML =
          `<div class="alert alert-warning mb-0"><strong>⚠️ Error</strong> — ${escapeHtml(msg)}</div>`;
        document.getElementById('result-details').innerHTML = '';
      },
    };

    // ─── APP ───────────────────────────────────────────────────────────────────
    const app = {
      state: {
        provincia: '', poblacion: '', tipoVia: '', via: '', numero: '',
        _provinces:    [],   // lista de provincias (para restaurar en onReset)
        _baseResults:  [],   // resultados de /Cobertura para el número+piso actual
        _activeFilters: {},  // filtros cliente activos: { fieldName: value }
      },
      _acProvincia: null,
      _acPoblacion: null,
      _acVia:       null,

      formatError(err, accion) {
        if (!err.status)        return `Sin conexión al ${accion}. Compruebe la red.`;
        if (err.status === 401) return `No autorizado. Compruebe las credenciales o el token.`;
        if (err.status === 404) return `Sin resultados.`;
        if (err.status >= 500)  return `Error del servidor (${err.status}) al ${accion}.`;
        return `Error ${err.status} al ${accion}.`;
      },

      // Aplica _activeFilters sobre _baseResults
      _getFilteredResults() {
        return this.state._baseResults.filter(rec =>
          Object.entries(this.state._activeFilters).every(
            ([k, v]) => !v || String(rec[k] ?? '') === String(v)
          )
        );
      },

      // Renderiza los pasos de filtro cliente para DYNAMIC_FILTER_ORDER
      // a partir de fromIndex, usando los datos de `results`
      _renderClientFilters(results, fromIndex, startStepNum) {
        DYNAMIC_FILTER_ORDER.slice(fromIndex).forEach((field, i) => {
          const vals = [...new Set(results.map(r => r[field]).filter(v => v !== null && v !== undefined && v !== ''))]
            .sort((a, b) => String(a).localeCompare(String(b), 'es'));
          if (vals.length <= 1) return; // sin variación → no se muestra
          const sel = ui.renderDynamicStep({
            fieldName: field,
            label:     FIELD_LABELS[field] || field,
            stepNum:   startStepNum + i,
            data:      vals,
            optional:  false,
          });
          sel.addEventListener('change', e => this.onDynFilterChange(field, e.target.value));
        });
      },

      // Elimina del DOM los pasos dinámicos que vienen DESPUÉS de afterField
      _clearClientFiltersAfter(afterField) {
        const container = document.getElementById('dynamic-steps');
        const afterIdx  = DYNAMIC_FILTER_ORDER.indexOf(afterField);
        DYNAMIC_FILTER_ORDER.slice(afterIdx + 1).forEach(field => {
          const el = container.querySelector(`[data-field="${field}"]`);
          if (el) el.remove();
          delete this.state._activeFilters[field];
        });
      },

      // Devuelve true si hay algún selector dinámico renderizado pero sin seleccionar
      _hasUnselectedFilters() {
        const container = document.getElementById('dynamic-steps');
        // Piso
        const pisoSel = document.getElementById('dyn-piso');
        if (pisoSel && !pisoSel.value) return true;
        // Filtros cliente
        return DYNAMIC_FILTER_ORDER.some(field => {
          const wrapper = container.querySelector(`[data-field="${field}"]`);
          if (!wrapper) return false;
          const sel = wrapper.querySelector('select');
          return sel && !sel.value;
        });
      },

      // Actualiza el texto/estado del botón según cuántos resultados quedan
      _updateCheckButton(count) {
        const btn = document.getElementById('btn-check');
        if (count === 0) {
          btn.disabled    = true;
          btn.textContent = 'Sin resultados para este filtro';
          return;
        }
        if (count === 1) {
          btn.disabled    = false;
          btn.textContent = 'Comprobar cobertura';
          return;
        }
        // Más de 1 resultado: bloquear si quedan filtros por rellenar
        const mustFilter = this._hasUnselectedFilters();
        btn.disabled    = mustFilter;
        btn.textContent = `Comprobar cobertura (${count} resultados)`;
      },

      // Precarga /Cobertura con el piso dado, calcula los filtros cliente y
      // actualiza el botón. El spinner ya debe estar activo al llamar a este método.
      async _loadBaseResults(piso) {
        const { poblacion, tipoVia, via, numero } = this.state;
        try {
          const data = await apiService.getCobertura(poblacion, tipoVia, via, numero, piso);
          this.state._baseResults   = data || [];
          this.state._activeFilters = {};
          // El piso ocupa el paso 5; los filtros cliente empiezan en el 6
          this._renderClientFilters(this.state._baseResults, 0, 6);
          this._updateCheckButton(this.state._baseResults.length);
        } catch (err) {
          if (err.status === 404) {
            this.state._baseResults = [];
            this._updateCheckButton(0);
          } else {
            debug('_loadBaseResults error:', err);
            ui.setError('err-numero', this.formatError(err, 'cargar los datos de cobertura'));
          }
        }
      },

      async start() {
        this._acProvincia = buildAutocomplete({
          containerId: 'ac-provincia-container',
          data:        [],
          placeholder: 'Buscar provincia...',
          errId:       'err-provincia',
          onSelect:    value => this.onProvinciaChange(value),
        });
        this._acPoblacion = buildAutocomplete({
          containerId: 'ac-poblacion-container',
          data:        [],
          placeholder: 'Buscar población...',
          errId:       'err-poblacion',
          onSelect:    value => this.onPoblacionChange(value),
        });
        this._acVia = buildAutocomplete({
          containerId: 'ac-via-container',
          data:        [],
          placeholder: 'Buscar vía...',
          errId:       'err-via',
          onSelect:    value => this.onViaChange(value),
        });

        if (!auth.hasToken()) {
          try {
            debug('autologin con config.js');
            const res = await fetch(`${BASE_URL}/Account/login`, {
              method:  'POST',
              headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
              body:    JSON.stringify({ Username: SIA_USER, Password: SIA_PASS }),
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            auth.token = Array.isArray(data) ? data[0] : data;
          } catch (e) {
            debug('autologin error:', e);
            ui.setError('err-provincia', 'No se pudo autenticar con la API. Comprueba config.js.');
            return;
          }
        }
        this.init();
      },

      async init() {
        ui.spinner(true);
        try {
          const data = await apiService.getProvincias();
          let provinces;
          if (data.length > 0 && typeof data[0] === 'string') {
            provinces = [...new Set(data)].sort((a, b) => a.localeCompare(b, 'es'));
          } else {
            provinces = [...new Set(data.map(d => d.Provincia).filter(Boolean))]
              .sort((a, b) => a.localeCompare(b, 'es'));
            if (provinces.length === 0) {
              provinces = [...new Set(data.map(d => d.Poblacion).filter(Boolean))]
                .sort((a, b) => a.localeCompare(b, 'es'));
            }
          }
          this.state._provinces = provinces;
          this._acProvincia.setData(provinces);
        } catch (err) {
          debug('init error:', err);
          ui.setError('err-provincia', this.formatError(err, 'cargar las provincias'));
        } finally {
          ui.spinner(false);
        }
      },

      async onProvinciaChange(provincia) {
        this.state.provincia = provincia;
        ui.resetFrom(0);
        this.state._baseResults  = [];
        this.state._activeFilters = {};
        if (!provincia) return;
        ui.spinner(true);
        try {
          const data  = await apiService.getPoblaciones(provincia);
          const items = (data.length > 0 && typeof data[0] === 'string')
            ? [...new Set(data)].sort((a, b) => a.localeCompare(b, 'es'))
            : [...new Set(data.map(d => d.poblacion || d.Poblacion).filter(Boolean))]
                .sort((a, b) => a.localeCompare(b, 'es'));
          this._acPoblacion.setData(items);
        } catch (err) {
          debug('onProvinciaChange error:', err);
          ui.setError('err-provincia', this.formatError(err, 'cargar las poblaciones'));
        } finally {
          ui.spinner(false);
        }
      },

      async onPoblacionChange(poblacion) {
        this.state.poblacion = poblacion;
        ui.resetFrom(1);
        this.state._baseResults  = [];
        this.state._activeFilters = {};
        if (!poblacion) return;
        ui.spinner(true);
        try {
          const data   = await apiService.getTipoVia(poblacion);
          const sorted = [...data].sort((a, b) => a.localeCompare(b, 'es'));
          ui.populateSelect('sel-tipo-via', sorted, t => t, t => t, 'Seleccione un tipo de vía...');
        } catch (err) {
          debug('onPoblacionChange error:', err);
          ui.setError('err-poblacion', this.formatError(err, 'cargar los tipos de vía'));
        } finally {
          ui.spinner(false);
        }
      },

      async onTipoViaChange(tipoVia) {
        this.state.tipoVia = tipoVia;
        ui.resetFrom(2);
        this.state._baseResults  = [];
        this.state._activeFilters = {};
        if (!tipoVia) return;
        ui.spinner(true);
        try {
          const data   = await apiService.getDomicilio(this.state.poblacion, tipoVia);
          const sorted = [...data].sort((a, b) => a.localeCompare(b, 'es'));
          this._acVia.setData(sorted);
        } catch (err) {
          debug('onTipoViaChange error:', err);
          ui.setError('err-tipo-via', this.formatError(err, 'cargar las vías'));
        } finally {
          ui.spinner(false);
        }
      },

      async onViaChange(via) {
        this.state.via = via;
        ui.resetFrom(3);
        this.state._baseResults  = [];
        this.state._activeFilters = {};
        if (!via) return;
        ui.spinner(true);
        try {
          const data   = await apiService.getNumero(this.state.poblacion, this.state.tipoVia, via);
          const sorted = [...data].sort((a, b) => {
            const na = parseInt(a, 10), nb = parseInt(b, 10);
            return (!isNaN(na) && !isNaN(nb)) ? na - nb : a.localeCompare(b, 'es');
          });
          ui.populateSelect('sel-numero', sorted, n => n, n => n, 'Seleccione un número...');
        } catch (err) {
          debug('onViaChange error:', err);
          ui.setError('err-via', this.formatError(err, 'cargar los números'));
        } finally {
          ui.spinner(false);
        }
      },

      async onNumeroChange(numero) {
        this.state.numero = numero;
        ui.resetFrom(4);
        this.state._baseResults  = [];
        this.state._activeFilters = {};
        if (!numero) return;

        ui.spinner(true);
        try {
          // Cargar pisos (fallo no bloqueante)
          let pisos = [];
          try {
            pisos = await apiService.getPisos(
              this.state.poblacion, this.state.tipoVia, this.state.via, numero
            );
          } catch (e) { debug('getPisos fallo (no bloqueante):', e); }

          if (pisos.length > 0) {
            const sel = ui.renderDynamicStep({
              fieldName: 'piso',
              label:     'Piso',
              stepNum:   5,
              data:      pisos,
              optional:  false,
            });
            sel.addEventListener('change', e => this.onPisoChange(e.target.value));
          }

          // Precarga de cobertura (sin piso) para calcular filtros cliente
          await this._loadBaseResults('');
        } finally {
          ui.spinner(false);
        }
      },

      // El usuario cambia el selector de Piso (paso dinámico 5)
      async onPisoChange(piso) {
        // Eliminar filtros cliente y re-cargar con el nuevo piso
        DYNAMIC_FILTER_ORDER.forEach(field => {
          const el = document.querySelector(`#dynamic-steps [data-field="${field}"]`);
          if (el) el.remove();
          delete this.state._activeFilters[field];
        });
        ui.spinner(true);
        try {
          await this._loadBaseResults(piso);
        } finally {
          ui.spinner(false);
        }
      },

      // El usuario cambia un filtro cliente (escalera, puerta, planta…)
      onDynFilterChange(fieldName, value) {
        this.state._activeFilters[fieldName] = value;
        // Eliminar pasos posteriores y sus filtros
        this._clearClientFiltersAfter(fieldName);
        // Aplicar todos los filtros activos
        const filtered = this._getFilteredResults();
        // Calcular el stepNum del siguiente paso
        const fieldIdx    = DYNAMIC_FILTER_ORDER.indexOf(fieldName);
        const pisoStep    = document.querySelector('#dynamic-steps [data-field="piso"]') ? 1 : 0;
        const startStep   = 6 + pisoStep + fieldIdx;
        // Renderizar siguientes filtros si hay más variación
        this._renderClientFilters(filtered, fieldIdx + 1, startStep);
        this._updateCheckButton(filtered.length);
      },

      async onSubmit() {
        const filtered = this._getFilteredResults();
        const btn      = document.getElementById('btn-check');

        btn.disabled = true;
        ui.spinner(true);
        document.getElementById('col-result').hidden = true;

        try {
          if (this.state._baseResults.length > 0) {
            await ui.showResult(filtered.length > 0 ? filtered : this.state._baseResults);
          } else {
            // Fallback: llamada directa si la precarga falló
            const { poblacion, tipoVia, via, numero } = this.state;
            const pisoSel = document.getElementById('dyn-piso');
            const piso    = pisoSel ? pisoSel.value : '';
            const data    = await apiService.getCobertura(poblacion, tipoVia, via, numero, piso);
            await ui.showResult(data);
          }
        } catch (err) {
          debug('onSubmit error:', err);
          err.status === 404
            ? await ui.showResult([])
            : ui.showResultError(this.formatError(err, 'comprobar la cobertura'));
        } finally {
          ui.spinner(false);
          btn.disabled = false;
        }
      },

      onReset() {
        const provinces = this.state._provinces;
        this.state = {
          provincia: '', poblacion: '', tipoVia: '', via: '', numero: '',
          _provinces:    provinces,
          _baseResults:  [],
          _activeFilters: {},
        };
        this._acProvincia.setData(provinces);
        ui.resetFrom(0);
      },
    };

    // ─── EVENTOS ───────────────────────────────────────────────────────────────
    document.getElementById('sel-tipo-via').addEventListener('change', e => app.onTipoViaChange(e.target.value));
    document.getElementById('sel-numero')  .addEventListener('change', e => app.onNumeroChange(e.target.value));
    document.getElementById('btn-check')   .addEventListener('click',  () => app.onSubmit());
    document.getElementById('btn-reset')   .addEventListener('click',  () => app.onReset());

    // ─── ARRANQUE ──────────────────────────────────────────────────────────────
    app.start();
  </script>
</body>
</html>
